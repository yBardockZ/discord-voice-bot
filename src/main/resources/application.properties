spring.application.name=discord-voice-bot

# Database Configuration
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:5432/voice_tracker_db
spring.datasource.username=${DB_USER:user_bot}
spring.datasource.password=${DB_PASS:password_bot}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway Migrations
spring.flyway.enabled=true
